# Default configuration for metahq-setup pipeline
# This file can be used as a template for custom configurations

# Directory paths
data_dir: ./data
output_dir: ./output
temp_dir: /tmp/metahq_setup
checkpoint_dir: .checkpoints
log_dir: .log

# Data source processors
processors:
  gemma:
    enabled: true
    download: true
    max_records: null  # Process all records
    custom_params: {}

  ale:
    enabled: true
    download: true
    max_records: null

  cello:
    enabled: true
    download: true
    max_records: null

  creeds:
    enabled: true
    download: true
    max_records: null

  golightly:
    enabled: true
    download: true
    max_records: null

  gu:
    enabled: true
    download: true
    max_records: null

  sampleclass_zoo:
    enabled: true
    download: true
    max_records: null

  ursa:
    enabled: true
    download: true
    max_records: null

  disign_atlas:
    enabled: true
    download: true
    max_records: null

# Ontologies to process
ontologies:
  - name: mondo
    download: true
    url: null
    extract_relations: true

  - name: uberon
    download: true
    url: null
    extract_relations: true

  - name: cl
    download: true
    url: null
    extract_relations: true

  - name: bto
    download: true
    url: null
    extract_relations: true

# Pipeline stages configuration
stages:
  fetch_metadata:
    skip: false
    use_checkpoint: true
    timeout: null

  download_ontologies:
    skip: false
    use_checkpoint: true
    timeout: null

  extract_relations:
    skip: false
    use_checkpoint: true
    timeout: null

  process_sources:
    skip: false
    use_checkpoint: true
    timeout: null

  combine_geo:
    skip: false
    use_checkpoint: true
    timeout: null

  combine_sra:
    skip: false
    use_checkpoint: true
    timeout: null

  map_ids:
    skip: false
    use_checkpoint: true
    timeout: null

  merge_annotations:
    skip: false
    use_checkpoint: true
    timeout: null

  propagate:
    skip: false
    use_checkpoint: true
    timeout: null

  build_metadata:
    skip: false
    use_checkpoint: true
    timeout: null

  build_database:
    skip: false
    use_checkpoint: true
    timeout: null

  validate:
    skip: false
    use_checkpoint: true
    timeout: null

# Parallel processing configuration
parallel:
  num_workers: 4
  chunk_size: 1000
  use_multiprocessing: true

# Validation configuration
validation:
  strict: true
  warn_only: false
  check_ontology_coverage: true

# General options
clean_temp: true
verbose: false
