[project]
name = "metahq-setup"
version = "0.1.0"
description = "Data pipeline package for building the MetaHQ database"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    {name = "Parker Hicks", email = "parker.hicks@cuanschutz.edu"},
    {name = "Christopher A Mancuso", email = "christopher.a.mancuso@cuanschutz.edu"},
    {name = "Faisal Alquaddoomi", email = "faisal.alquaddoomi@cuanschutz.edu"},
]
keywords = ["Database", "Data Pipeline", "Biomedical Data", "Ontology"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]

dependencies = [
    # Core data processing
    "polars>=1.35.0",
    "pyarrow>=10.0.0",
    "numpy>=2.3.0",
    "duckdb>=1.4.0",

    # Database and storage
    "pymongo>=4.13.0",

    # Configuration and validation
    "pydantic>=2.0.0",
    "pyyaml>=6.0",

    # CLI and UI
    "click>=8.3.0",
    "rich>=13.0.0",
    "tqdm>=4.67.1",

    # HTTP requests
    "requests>=2.30.0",

    # Ontology processing
    "pronto>=2.5.0",
    "networkx>=3.0",

    # Parallel processing
    "joblib>=1.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "pytest-benchmark",
    "black",
    "isort",
    "flake8",
    "mypy",
    "mkdocs>=1.6.1",
    "mkdocstrings[python]",
    "mkdocs-material",
    "pymdown-extensions",
]

test = [
    "pytest>=8.0",
    "pytest-cov",
    "pytest-benchmark",
]

[project.scripts]
metahq-setup = "metahq_setup.cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/metahq_setup/__version__.py"

[tool.hatch.build.targets.sdist]
exclude = ["/.git", "/__pycache__", "*.pyc"]
include = ["src/metahq_setup"]

[tool.hatch.build.targets.wheel]
packages = ["src/metahq_setup"]

[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'

[tool.isort]
profile = "black"
multi_line_output = 3

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # Set to true when ready for strict typing

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
