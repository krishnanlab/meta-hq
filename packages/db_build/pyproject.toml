[project]
name = "metahq-build"
dynamic = ["version"]
description = "Data pipeline package for building the MetaHQ database"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    {name = "Parker Hicks", email = "parker.hicks@cuanschutz.edu"},
    {name = "Lydia E. Valtadoros", email = "lydia.valtadoros@cuanschutz.edu"},
]
keywords = ["Database", "Data Pipeline", "Biomedical Data", "Ontology"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]

dependencies = [
    "pandas<3.0.0",
    "polars>=1.35.0",
    "pyarrow>=10.0.0",
    "numpy>=2.3.0",
    "duckdb>=1.4.0",
    "pymongo>=4.13.0",
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
    "click>=8.3.0",
    "rich>=13.0.0",
    "tqdm>=4.67.1",
    "requests>=2.30.0",
    "pronto>=2.5.0",
    "networkx>=3.0",
    "joblib>=1.3.0",
    "nbformat<=10.5.4",
    "upsetplot>=0.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "pytest-benchmark",
    "black",
    "isort",
    "flake8",
    "mypy",
    "mkdocs>=1.6.1",
    "mkdocstrings[python]",
    "mkdocs-material",
    "pymdown-extensions",
]

test = [
    "pytest>=8.0",
    "pytest-cov",
    "pytest-benchmark",
]

[project.scripts]
metahq-build = "metahq_build.cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/metahq_build/__version__.py"

[tool.hatch.build.targets.sdist]
exclude = ["/.git", "/__pycache__", "*.pyc"]
include = ["src/metahq_build"]

[tool.hatch.build.targets.wheel]
packages = ["src/metahq_build"]

[tool.black]
line-length = 88
target-version = ['py314']
include = '\.pyi?$'

[tool.isort]
profile = "black"
multi_line_output = 3

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false 

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
