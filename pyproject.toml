[tool.uv.workspace]
members = ["packages/core", "packages/cli", "packages/setup"]

[tool.uv.sources]
metahq-core = { workspace = true }
metahq-cli = { workspace = true }
metahq-setup = { workspace = true }

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-cov",
    "pytest-benchmark",
    "black",
    "isort",
    "flake8",
    "mypy",
    "vulture",
    "metahq-cli",
    "metahq-core",
    "metahq-setup",
    "mkdocs>=1.6.1",
    "pymdown-extensions",
    "mkdocstrings[python]",
    "mkdocs-material",
    "mkdocs-click",
]
