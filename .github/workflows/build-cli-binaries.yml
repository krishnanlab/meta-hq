name: Build Binaries & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: metahq-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact_name: metahq-linux-arm64
          - os: macos-latest
            artifact_name: metahq-macos-arm64
          - os: macos-26-intel
            artifact_name: metahq-macos-intel
          - os: windows-latest
            artifact_name: metahq-windows-x86_64.exe
          - os: windows-11-arm
            artifact_name: metahq-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e packages/cli

      - name: Build binary
        run: pyinstaller metahq-cli.spec

      # Rename the output to the platform-specific name
      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/metahq dist/${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/metahq.exe dist/${{ matrix.artifact_name }}

      # Upload each binary as an artifact so the release step can grab them
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
        run: |
          uv build packages/core
          uv build packages/cli

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
